apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: agendafacil
  labels:
    app: agendafacil-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agendafacil-frontend
  template:
    metadata:
      labels:
        app: agendafacil-frontend
    spec:
      containers:
        - name: agendafacil-frontend
          image: pescador95/agendafacil:react
          ports:
            - containerPort: 80
          resources:
            limits:
              memory: "256Mi"
          env:
            - name: QUARKUS_BASEURL
              value: "http://backend-service"
